<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animation.css">
    <title>Holly Fest - AMERTHA 2026</title>
</head>
<body>
    <!-- Navigasi web nya -->
    <nav id="navbar">
        <div class="container">
            <h2 class="logo">HollyFest 2026</h2>

            <ul>
                <li><a href="#hero">Beranda</a></li>
                <li><a href="#gallery">Galeri</a></li>
                <li><a href="#video">Video</a></li>
            </ul>
        </div>
    </nav>

    <!-- Header Hero  -->
    <header class="hero" id="hero">
        <img src="images/hero.jpg" alt="">
        <div class="hero-content">
            <h1 class="animate">HollyFest 2026</h1>
            <p class="animate delay-1">AMERTHA - Present</p>
        </div>
    </header>

    <!-- main -->
    <main>
        <!-- gallery -->
        <section id="gallery">
            <h1 style=" text-align: center; margin-top: 30px;">Galeri</h1>
            <div class="container">
                <div class="gallery-grid" id="galleryGrid">
                    
                </div>
            </div>
        </section>

        <!-- video -->
        <section id="video">
            <h1 style="text-align: center; margin-top: 50px; ">Video</h1>
            <div class="container">
                <div class="video-grid" id="videoGrid">

                </div>
            </div>

        </section>

    </main>

    <button id="music-btn" class="rotate">
        🎵
    </button>
    
    <audio id="bgm" loop>
        <source src="bgm.mp3" type="audio/mpeg">
    </audio>
    <!-- footer -->
    <footer style="background-color: #1f2937; margin-top: 10px;">
         <p style="text-align: center; color: aliceblue;">Copyright &copy; 2026. All Rights Reserved.</p>
    </footer>

    <script src="js/gallery.js"></script>
    <script src="js/video.js"></script>
    <script src="js/animation.js"></script>
</body>
</html>
